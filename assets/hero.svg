<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" width="880" height="340"
     font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace">
  <!-- offset shadow -->
  <rect x="12" y="14" width="864" height="320" fill="#2b1d12"/>
  <!-- card body -->
  <rect x="4" y="6" width="864" height="320" fill="#fbe9d7" stroke="#2b1d12" stroke-width="6"/>
  <!-- titlebar -->
  <rect x="4" y="6" width="864" height="34" fill="#2b1d12"/>
  <text x="20" y="28" font-size="14" fill="#fbe9d7" letter-spacing="1.5">▸ doyled-it.card</text>
  <text x="852" y="28" font-size="14" fill="#fbe9d7" text-anchor="end" letter-spacing="1.5">v1.0</text>

  <!-- name + tagline -->
  <text x="32" y="100" font-size="44" font-weight="800" fill="#2b1d12" letter-spacing="-0.5">Michael Doyle</text>
  <text x="32" y="128" font-size="14" fill="#2b1d12">lead ai research engineer · former ballplayer · current golfer</text>

  <!-- chip row -->
  <g id="chips" transform="translate(32, 168)">
    <!-- chip: baseball -->
    <g transform="translate(0,0)">
      <rect x="3" y="3" width="190" height="120" fill="#2b1d12"/>
      <rect x="0" y="0" width="190" height="120" fill="#ffffff" stroke="#2b1d12" stroke-width="3"/>
      <rect id="sprite-baseball-slot" x="79" y="20" width="32" height="32" fill="#fbe9d7" stroke="#2b1d12" stroke-width="2"/>
      <text x="95" y="92" font-size="13" text-anchor="middle" fill="#2b1d12">baseball</text>
    </g>
    <!-- chip: golf -->
    <g transform="translate(206,0)">
      <rect x="3" y="3" width="190" height="120" fill="#2b1d12"/>
      <rect x="0" y="0" width="190" height="120" fill="#ffffff" stroke="#2b1d12" stroke-width="3"/>
      <rect id="sprite-golf-iron-slot" x="79" y="20" width="32" height="32" fill="#fbe9d7" stroke="#2b1d12" stroke-width="2"/>
      <text x="95" y="92" font-size="13" text-anchor="middle" fill="#2b1d12">golf</text>
    </g>
    <!-- chip: vinyl -->
    <g transform="translate(412,0)">
      <rect x="3" y="3" width="190" height="120" fill="#2b1d12"/>
      <rect x="0" y="0" width="190" height="120" fill="#ffffff" stroke="#2b1d12" stroke-width="3"/>
      <rect id="sprite-vinyl-slot" x="79" y="20" width="32" height="32" fill="#fbe9d7" stroke="#2b1d12" stroke-width="2"/>
      <text x="95" y="92" font-size="13" text-anchor="middle" fill="#2b1d12">music</text>
    </g>
    <!-- chip: pencil -->
    <g transform="translate(618,0)">
      <rect x="3" y="3" width="190" height="120" fill="#2b1d12"/>
      <rect x="0" y="0" width="190" height="120" fill="#ffffff" stroke="#2b1d12" stroke-width="3"/>
      <rect id="sprite-pencil-slot" x="79" y="20" width="32" height="32" fill="#fbe9d7" stroke="#2b1d12" stroke-width="2"/>
      <text x="95" y="92" font-size="13" text-anchor="middle" fill="#2b1d12">words</text>
    </g>
  </g>

  <!-- decoration band -->
  <g transform="translate(0, 308)">
    <rect x="4" y="0" width="864" height="18" fill="#2b1d12"/>
  </g>
</svg>
